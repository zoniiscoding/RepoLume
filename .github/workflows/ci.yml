name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality and real dependency verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: repolume_test
          POSTGRES_USER: repolume
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repolume -d repolume_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c '</dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://repolume:ci-only-password@127.0.0.1:5432/repolume_test
      TEST_DATABASE_URL: postgresql+asyncpg://repolume:ci-only-password@127.0.0.1:5432/repolume_test
      REDIS_URL: redis://127.0.0.1:6379/15
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
      QDRANT_URL: http://127.0.0.1:6333
      TEST_QDRANT_URL: http://127.0.0.1:6333
      QDRANT_COLLECTION_NAME: repolume_test_chunks
      EMBEDDING_SERVICE_URL: http://127.0.0.1:8100
      EMBEDDING_SERVICE_TOKEN: ci-only-embedding-secret-0000000000000
      TEST_EMBEDDING_SERVICE_URL: http://127.0.0.1:8100
      TEST_EMBEDDING_SERVICE_TOKEN: ci-only-embedding-secret-0000000000000
      GITHUB_APP_ID: 1
      GITHUB_CLIENT_ID: ci-test-client
      GITHUB_CLIENT_SECRET: ci-only-client-secret-000000000000000
      GITHUB_APP_PRIVATE_KEY: "-----BEGIN PRIVATE KEY----- ci-only -----END PRIVATE KEY-----"
      GITHUB_WEBHOOK_SECRET: ci-only-webhook-secret-00000000000000
      GITHUB_OAUTH_CALLBACK_URL: http://127.0.0.1/api/v1/auth/github/callback
      ACCESS_TOKEN_SECRET: ci-only-access-token-secret-000000000000
      TOKEN_HASH_SECRET: ci-only-token-hash-secret-00000000000000
      CORS_ORIGINS: '["http://testserver"]'
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements-dev.lock
            embedding_service/requirements-dev.lock

      - name: Install hashed dependencies
        run: |
          python -m pip install --require-hashes --requirement backend/requirements-dev.lock
          python -m pip install --require-hashes --requirement embedding_service/requirements-dev.lock

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Check formatting
        run: ruff format --check backend

      - name: Lint
        run: ruff check backend

      - name: Type check
        run: mypy --config-file backend/pyproject.toml backend/app backend/tests

      - name: Download immutable embedding model artifacts
        working-directory: embedding_service
        env:
          EMBEDDING_MODEL_CACHE_DIR: ${{ runner.temp }}/repolume-model-cache
        run: python -m app.download_model

      - name: Start and authenticate private embedding service
        working-directory: embedding_service
        env:
          EMBEDDING_ENVIRONMENT: test
          EMBEDDING_LOG_JSON: "true"
          EMBEDDING_MODEL_CACHE_DIR: ${{ runner.temp }}/repolume-model-cache
          EMBEDDING_MODEL_LOCAL_FILES_ONLY: "true"
          EMBEDDING_SERVICE_TOKEN: ci-only-embedding-secret-0000000000000
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8100 --no-access-log > "${RUNNER_TEMP}/embedding-service.log" 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --fail --silent --header "Authorization: Bearer ${EMBEDDING_SERVICE_TOKEN}" http://127.0.0.1:8100/health/ready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "${RUNNER_TEMP}/embedding-service.log"
          exit 1

      - name: Apply clean-database migration
        run: alembic -c backend/alembic.ini upgrade head

      - name: Verify migration matches metadata
        run: alembic -c backend/alembic.ini check

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Audit production dependencies
        run: pip-audit --requirement backend/requirements.lock --disable-pip

  embedding-service:
    name: Embedding service quality and pinned-model verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: embedding_service/requirements-dev.lock

      - name: Install hashed dependencies
        run: python -m pip install --require-hashes --requirement embedding_service/requirements-dev.lock

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Check formatting
        run: ruff format --check embedding_service

      - name: Lint
        run: ruff check embedding_service

      - name: Type check
        run: mypy --config-file embedding_service/pyproject.toml embedding_service/app embedding_service/tests

      - name: Download immutable embedding model artifacts
        working-directory: embedding_service
        env:
          EMBEDDING_MODEL_CACHE_DIR: ${{ runner.temp }}/repolume-model-cache
        run: python -m app.download_model

      - name: Run service and real-model tests
        env:
          HF_HUB_OFFLINE: "1"
          REPOLUME_TEST_MODEL_CACHE: ${{ runner.temp }}/repolume-model-cache
        run: pytest embedding_service

      - name: Audit production dependencies
        run: pip-audit --requirement embedding_service/requirements.lock --disable-pip

  backend-container:
    name: Production container builds and vulnerability scans
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build backend image
        run: docker build --tag repolume-api:ci backend

      - name: Build embedding service image
        run: docker build --tag repolume-embedding-service:ci embedding_service

      - name: Verify non-root runtime user
        run: docker inspect --format='{{.Config.User}}' repolume-api:ci | grep --fixed-strings --line-regexp '10001:10001'

      - name: Verify API and worker entry points
        run: |
          docker inspect --format='{{json .Config.Cmd}}' repolume-api:ci | grep --fixed-strings 'uvicorn'
          docker run --rm --entrypoint python repolume-api:ci --version | grep --fixed-strings 'Python 3.13'
          docker run --rm --entrypoint python repolume-api:ci -c 'import app.worker'
          docker run --rm --entrypoint /usr/bin/git repolume-api:ci --version | grep --fixed-strings 'git version'

      - name: Verify embedding service runtime
        run: |
          docker inspect --format='{{.Config.User}}' repolume-embedding-service:ci | grep --fixed-strings --line-regexp '10002:10002'
          docker inspect --format='{{json .Config.Cmd}}' repolume-embedding-service:ci | grep --fixed-strings 'uvicorn'
          docker run --rm --entrypoint python repolume-embedding-service:ci --version | grep --fixed-strings 'Python 3.13'

      - name: Scan backend image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: repolume-api:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: true

      - name: Scan embedding service image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: repolume-embedding-service:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: true
