name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality and PostgreSQL verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: repolume_test
          POSTGRES_USER: repolume
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repolume -d repolume_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://repolume:ci-only-password@127.0.0.1:5432/repolume_test
      TEST_DATABASE_URL: postgresql+asyncpg://repolume:ci-only-password@127.0.0.1:5432/repolume_test
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install hashed dependencies
        run: python -m pip install --require-hashes --requirement backend/requirements-dev.lock

      - name: Check formatting
        run: ruff format --check backend

      - name: Lint
        run: ruff check backend

      - name: Type check
        run: mypy backend/app backend/tests

      - name: Apply clean-database migration
        run: alembic -c backend/alembic.ini upgrade head

      - name: Verify migration matches metadata
        run: alembic -c backend/alembic.ini check

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Audit production dependencies
        run: pip-audit --requirement backend/requirements.lock --disable-pip

  backend-container:
    name: Backend container build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build backend image
        run: docker build --tag repolume-api:ci backend

      - name: Verify non-root runtime user
        run: docker inspect --format='{{.Config.User}}' repolume-api:ci | grep --fixed-strings --line-regexp '10001:10001'
